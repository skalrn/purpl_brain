# docker-compose.demo.yml — zero-config demo for beta testers
#
# Starts the full Orion Commerce demo dataset automatically.
# No API keys, no .env file, no seed commands needed.
#
# Usage:
#   docker compose -f docker-compose.demo.yml up
#   open http://localhost:3000
#
# The demo-seeder service runs once on startup and populates the brain
# with 8 weeks of realistic e-commerce engineering decisions. It exits
# when seeding is complete — the other services keep running.
#
# Suggested queries (also printed by the seeder):
#   "Why does the order confirmation email require both payment and inventory?"
#   "What did Priya decide about refunds?"
#   "What did Aria implement for payment reliability?"
#   "What changed in the order management approach over the last two months?"
#   "Why did we decide not to support order modifications?"
#   "Show me open drift alerts"
#
# Ollama (local LLM) must be running on the host before starting.
#   ollama pull nomic-embed-text:v1.5
#   ollama pull gemma3n:e2b

services:
  redis:
    image: redis:7-alpine
    volumes:
      - demo_redis:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - demo_qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: neo4j/demo-password
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - demo_neo4j:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  api:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    ports:
      - "3001:3001"
    environment:
      NODE_ENV: demo
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-password
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-gemma3n:e2b}
      OLLAMA_SMART_MODEL: ${OLLAMA_SMART_MODEL:-gemma3n:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:v1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      DEV_API_KEY: demo-key
      SESSION_SECRET: demo-session-secret-not-for-production
      SESSION_COOKIE_SECURE: "false"
      DEFAULT_PROJECT_ID: orion_commerce
      CONTEXT_BUDGET: "6000"
      DRIFT_SEMANTIC_THRESHOLD: "0.55"
      DRIFT_TOP_K: "3"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 15
      start_period: 10s

  normalizer:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-password
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-gemma3n:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:v1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SESSION_SECRET: demo-session-secret-not-for-production
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/normalizer.js"]
    stop_grace_period: 20s

  extractor:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-password
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-gemma3n:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:v1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SESSION_SECRET: demo-session-secret-not-for-production
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/extractor.js"]
    stop_grace_period: 30s

  brain-writer:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-password
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-gemma3n:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:v1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SESSION_SECRET: demo-session-secret-not-for-production
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/brain-writer.js"]
    stop_grace_period: 30s

  drift-detector:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: neo4j
      NEO4J_PASSWORD: demo-password
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
      LLM_PROVIDER: ${LLM_PROVIDER:-ollama}
      OLLAMA_FAST_MODEL: ${OLLAMA_FAST_MODEL:-gemma3n:e2b}
      OLLAMA_EMBED_MODEL: ${OLLAMA_EMBED_MODEL:-nomic-embed-text:v1.5}
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      SESSION_SECRET: demo-session-secret-not-for-production
      DRIFT_SEMANTIC_THRESHOLD: "0.55"
      DRIFT_TOP_K: "3"
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/drift-detector.js"]
    stop_grace_period: 30s

  # web: not yet released — API-only beta
  # Query the brain via: curl http://localhost:3001/brain/query ...
  # or connect Claude Code via MCP (see README).

  # Runs once on startup, seeds the Orion Commerce demo dataset, then exits.
  # The restart:no policy ensures Docker does not restart it after completion.
  demo-seeder:
    image: ghcr.io/skalrn/purpl-brain-api:beta-latest
    environment:
      API_BASE: http://api:3001
      REDIS_URL: redis://redis:6379
      BRAIN_API_KEY: demo-key
      SESSION_SECRET: demo-session-secret-not-for-production
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/scripts/seed-demo.js"]
    restart: "no"

volumes:
  demo_redis:
  demo_qdrant:
  demo_neo4j:
