# docker-compose.prod.yml — real project setup using pre-built GHCR images.
# No Node.js required. Use setup-prebuilt.sh for automated credential generation.
#
# Usage (manual):
#   curl -O https://raw.githubusercontent.com/skalrn/purpl_brain/main/setup-prebuilt.sh
#   bash setup-prebuilt.sh
#
# Ollama users: Ollama must be running on the host before starting.
#   Required models:
#     ollama pull nomic-embed-text:v1.5   # embeddings — always required
#     ollama pull llama3.1:8b             # extraction + query answering
#   For ~2s responses: set LLM_PROVIDER=anthropic and ANTHROPIC_API_KEY in .env

services:
  # ── Infrastructure (public images — no login required) ────────────────────
  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  qdrant:
    image: qdrant/qdrant:latest
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/localhost/6333' 2>/dev/null || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 15

  neo4j:
    image: neo4j:5-community
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH}
      NEO4J_PLUGINS: '["apoc"]'
      NEO4J_apoc_export_file_enabled: "true"
      NEO4J_apoc_import_file_enabled: "true"
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:7474 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 20
      start_period: 30s

  # ── Application services (pre-built GHCR images) ──────────────────────────
  api:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    ports:
      - "3741:3001"
    env_file: .env
    environment:
      NODE_ENV: production
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3001/health || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 10s

  normalizer:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/normalizer.js"]
    stop_grace_period: 20s

  extractor:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/extractor.js"]
    stop_grace_period: 30s

  brain-writer:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/brain-writer.js"]
    stop_grace_period: 30s

  drift-detector:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
      NEO4J_URI: bolt://neo4j:7687
      QDRANT_URL: http://qdrant:6333
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434/v1}
    depends_on:
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      qdrant:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/drift-detector.js"]
    stop_grace_period: 30s

  slack-listener:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "dist/workers/slack-listener.js"]
    restart: on-failure

  # MCP server — connects Claude Code to the brain via HTTP transport.
  # Add to ~/.claude/settings.json:
  #   { "mcpServers": { "purpl-brain": { "url": "http://localhost:3742/mcp" } } }
  # If port 3002 is busy: MCP_HOST_PORT=3743 docker compose -f docker-compose.prod.yml up -d
  mcp:
    image: ghcr.io/skalrn/purpl-brain:beta-latest
    ports:
      - "${MCP_HOST_PORT:-3742}:3002"
    environment:
      MCP_TRANSPORT: http
      MCP_PORT: "3002"
      MCP_BIND_HOST: "0.0.0.0"
      BRAIN_API_URL: http://api:3001
      BRAIN_API_KEY: ${DEV_API_KEY}
      BRAIN_AGENT_ID: claude-code
    depends_on:
      api:
        condition: service_healthy
    extra_hosts:
      - "host.docker.internal:host-gateway"
    command: ["node", "/app/apps/mcp/dist/index.js"]
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3002/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 10
      start_period: 5s

  # web: not yet released — API-only beta

volumes:
  redis_data:
  qdrant_data:
  neo4j_data:
